[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — single-page app routes all to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for hashed Vite build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static media is content-addressable by name; cache for a day
[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/textures/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
